<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Focus Tracker</title>
    <style>
      body { background: #1e1e1e; color: white; font-family: sans-serif; padding: 20px; margin: 0; }
      h1, h2 { margin-top: 0; }
      .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
      .tab { padding: 10px 16px; border: none; cursor: pointer; background: #d9d9d9; border-radius: 8px; font-size: 14px; }
      .tab.active { background: #4a4a4a; color: white; }
      .tab-content { display: none; padding: 12px 0; }
      .tab-content.active { display: block; }
      #timer { font-size: 48px; margin: 16px 0; }
      .action { margin-right: 8px; margin-top: 8px; padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; }
      input, textarea { background: #2a2a2a; color: white; border: 1px solid #555; border-radius: 6px; padding: 8px; font-family: inherit; }
      textarea { width: 100%; box-sizing: border-box; }
      ul { padding-left: 20px; }
      li { margin-bottom: 8px; }
      .card { background: #252525; border: 1px solid #444; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
      .task-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .task-row input { flex: 1; min-width: 220px; }
      .hidden { display: none !important; }
      .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
      .modal-box { background: #252525; border: 1px solid #444; border-radius: 12px; padding: 24px; width: min(90vw, 420px); text-align: center; }
      .modal-image { max-width: 180px; display: block; margin: 12px auto; }
    </style>
  </head>
  <body>
    <h1>Focus Tracker</h1>

    <div class="tabs">
      <button class="tab active" data-tab="dashboard">Dashboard</button>
      <button class="tab" data-tab="timerTab">Timer</button>
      <button class="tab" data-tab="resume">Where You Left Off</button>
      <button class="tab" data-tab="log">Session Log</button>
    </div>

  <div id="dashboard" class="tab-content active">
  <h2>Dashboard</h2>
  <div class="card">
    <p id="focusSummary">No sessions yet.</p>
  </div>
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="tab-btn active" data-range="week">Week</button>
      <button class="tab-btn" data-range="month">Month</button>
      <button class="tab-btn" data-range="day">Today</button>
    </div>
    <canvas id="focusChart" height="120"></canvas>
  </div>
</div>

    <div id="timerTab" class="tab-content">
      <h2>Timer</h2>
      <div id="timer">00:00:00</div>
      <button class="action" id="startBtn">Start</button>
      <button class="action" id="pauseBtn">Pause</button>
      <button class="action" id="resetBtn">Reset</button>
      <button class="action" id="endBtn">End Session</button>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 10px">
  <h3 style="margin:0;font-size:15px;color:#ccc;text-transform:uppercase;letter-spacing:.05em">This Session</h3>
  <button class="action" id="addProjectBtn">＋ Add Project</button>
</div>
<div id="projectsContainer"></div>
    </div>

  <div id="resume" class="tab-content">
  <h2>Where You Left Off</h2>
  <div id="resumeContent"></div>
  </div>

  <div id="log" class="tab-content">
  <h2>Session Log</h2>
  <div class="card">
    <p id="logSummary"></p>
  </div>
  <ul id="logList"></ul>
</div>

    <div id="sessionModal" class="modal hidden">
      <div class="modal-box">
        <h2>Nice work!</h2>
        <img src="fireworks.gif" alt="Fireworks" class="modal-image" />
        <p id="sessionSummaryText"></p>
        <button class="action" id="closeSummaryBtn">Continue</button>
      </div>
    </div>

    <div id="lockedInSection" class="hidden card">
      <h2>Were you locked in?</h2>
      <button class="action" id="lockedInYesBtn">Yes</button>
      <button class="action" id="lockedInNoBtn">No</button>
    </div>

    <div id="breakSection" class="hidden card">
  <h2>Choose your break</h2>
  <div id="breakTimer">00:00</div>
  <select id="breakSelect">
    <option value="5">5 min</option>
    <option value="10">10 min</option>
    <option value="15">15 min</option>
    <option value="20">20 min</option>
    <option value="25">25 min</option>
    <option value="30">30 min</option>
  </select>
  <button class="action" id="startBreakBtn">Start Break</button>
  <button class="action" id="endBreakEarlyBtn">End Break Early</button>
</div>

    <div id="breakDoneSection" class="hidden card">
      <h2>Break has ended!</h2>
      <p>Ready to go again?</p>
      <div class="task-row">
        <button class="action" id="startSessionAgainBtn">Start Session Again</button>
        <button class="action" id="startSessionEarlyBtn">Start Early</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
